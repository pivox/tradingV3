# Configuration Alembic pour l'orchestrateur Python (DB-001).
# L'URL de connexion n'est PAS définie ici : env.py la lit depuis app.settings
# (variable DATABASE_URL), pour une source unique de configuration.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# La date des fichiers de version est en UTC.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
