# =====================================================================
# trade_entry.scalper_micro.yaml – Mode micro-structure only
# Risque réduit, daily loss cap strict, nombre de trades limité
# =====================================================================
version: '0.1.10-micro-zone-outside-tol-12'

meta:
    name: 'scalper_micro'
    description: >
        I putted 50 usdt with min leverage 2
        Scalping micro-structure (5m/1m) sans contexte 1h/4h, maintenant centré sur des
        entry zones serrées (w_max 0.018) avec tolérance runtime augmentée (zone_max_deviation_pct 12%,
        entry max_deviation_pct 15%) et zone élargie (offset_k 2.5, w_min 0.001) pour réduire les rejets entry_not_within_zone.
        Pivot: VWAP 1m (réactivité micro-scalping). ATR: 5m pour largeur plus stable.
        Chemin B (prudent): outside_tolerance_pct=1.2% pour éviter les skips entry_not_within_zone
        quand le candidat est légèrement hors zone (mais toujours proche du pivot).
        TF multipliers appliques juste avant submit (size + leverage), capes par
        max_loss_pct (perte SL <= initial_margin_usdt * pct).

trade_entry:

    # ============================
    # DEFAULTS
    # ============================
    defaults:
        # --- Sizing & Risk ---
        risk_pct_percent: 0.4             # 0.4 % du capital par trade
        initial_margin_usdt: 50.0        # budget relevé pour passer les min_size des contrats
        fallback_account_balance: 0.0
        r_multiple: 1.3                  # TP resserré (profil micro)
        tp1_r: 1.2

        # --- Stop Loss ---
        stop_from: 'atr'
        stop_fallback: 'atr'
        atr_k: 4.0                        # stop ≈ 4 × ATR(1m) (distance ×2)
        # pivot_sl_policy: 'nearest' → support/résistance la plus proche (levier max). 'strongest' priorise S2/R2 → stop plus large, levier réduit.
        pivot_sl_policy: 'nearest'
        pivot_sl_buffer_pct: 0.003
        pivot_sl_min_keep_ratio: 0.85
        sl_full_size: true

        # --- Take Profit ---
        tp_policy: 'pivot_conservative'
        tp_buffer_pct: 0.001
        tp_buffer_ticks: 0
        tp_min_keep_ratio: 0.95
        tp_max_extra_r: 0.4

        # --- Order Preferences ---
        order_type: 'limit'
        open_type: 'isolated'
        order_mode: 1                     # micro scalper agit en taker par défaut

        # --- Market & Spread Guards ---
        market_max_spread_pct: 0.001
        inside_ticks: 1
        max_deviation_pct: 0.02
        implausible_pct: 0.05
        zone_max_deviation_pct: 0.12      # tolérance 12 % (augmentée pour réduire rejets runtime)

        # --- Leverage helper ---
        k_dynamic: 10.0

        # --- TF scaling (appliqué AU LEVIER dynamique) ---
        timeframe_multipliers:
            '1m': 1.2

    # ============================
    # RISK MANAGEMENT
    # ============================
    risk:
        daily_max_loss_pct: 2.5
        daily_max_loss_usdt: 50.0
        daily_loss_count_unrealized: true
        max_concurrent_positions: 3
        meta: >
            Risque plus bas que le scalper principal, daily loss cap strict et
            limitation du nombre de trades simultanés.

    # ============================
    # LEVERAGE CONFIG
    # ============================
    leverage:
        floor: 2.0
        exchange_cap: 20.0              # Cap exchange applique seulement si TF multiplier = 1
        max_loss_pct: 0.4               # Perte max au SL vs initial_margin_usdt (cap size+leverage)
        per_symbol_caps: []
        timeframe_multipliers:          # Multiplicateurs TF appliques a la taille et au levier (avant submit)
            '1m': 20
        confidence_multiplier:
            enabled: false
        conviction:
            enabled: false
        rounding:
            precision: 2
            mode: floor
        meta: >
            Levier scale en execution (size+leverage), cap SL via max_loss_pct,
            exchange_cap utilise si multiplier = 1.

    # ============================
    # DECISION ENGINE
    # ============================
    decision:
        allowed_execution_timeframes: ['1m']
        require_price_or_atr: true

    # ============================
    # END-OF-ZONE FALLBACK
    # ============================
    fallback_end_of_zone:
        enabled: true
        ttl_threshold_sec: 25
        max_spread_bps: 8
        only_if_within_zone: true
        taker_order_type: 'market'
        max_slippage_bps: 10

    # ============================
    # ENTRY CONFIG
    # ============================
    entry:
        prefer_maker: true
        fallback_taker: true
        budget:
            mode: fixed_or_available
            fixed_usdt_if_available: 77
        quantization:
            price_tick: from_exchange
            qty_step: from_exchange
        slippage_guard_bps: 8
        spread_guard_bps: 6
        entry_zone:
            from: 'vwap'
            pivot_tf: '1m'
            offset_atr_tf: '5m'
            offset_k: 2.5           # largeur de zone ~ 1.25 × ATR(5m)
            outside_tolerance_pct: 0.012
            max_deviation_pct: 0.15  # tolérance 15 % (augmentée pour réduire rejets runtime)
            ttl_sec: 180
            quantize_to_exchange_step: true

    # ============================
    # POST-VALIDATION (EntryZone)
    # ============================
    post_validation:
        entry_zone:
            vwap_anchor: false
            k_atr: 0.35
            w_min: 0.0015
            w_max: 0.018
            ttl_sec: 240
            quantize_to_exchange_step: true
        idempotency:
            decision_key_tpl: "{symbol}:{timeframe}:{candle_open_ts}"
            max_attempts: 3
        meta: >
            Zone d'entrée courte, pure micro-structure autour de VWAP 1m (1m/5m).
