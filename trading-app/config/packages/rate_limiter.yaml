framework:
    rate_limiter:
        # Configuration du rate limiter
        # Pas de configuration Redis nécessaire si on utilise le filesystem
        enabled: true
        okx_paper_history:
            policy: sliding_window
            limit: 16
            interval: '2 seconds'
        okx_paper_snapshot:
            policy: sliding_window
            limit: 32
            interval: '2 seconds'
