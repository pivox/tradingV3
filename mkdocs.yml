site_name: TradingV3 Handbook
site_description: Documentation technique et fonctionnelle canonique du projet TradingV3
site_url: https://pivox.github.io/tradingV3/
docs_dir: docs/handbook
site_dir: docs/site
use_directory_urls: false
strict: true

theme:
  name: null
  custom_dir: docs/mkdocs_theme/bootstrap

nav:
  - Accueil: index.md
  - Architecture: architecture.md
  - Fonctionnel:
      - Vue d'ensemble: functional/index.md
      - Flux MTF: functional/mtf-run.md
      - Validation MTF: functional/mtf-validation.md
      - TradeEntry et risque: functional/trade-entry.md
      - Cockpit d'orchestration: functional/orchestration-dashboard.md
  - Technique:
      - Modules backend: technical/backend-modules.md
      - Interfaces et commandes: technical/interfaces.md
      - Donnees et persistance: technical/data.md
      - Configuration: technical/configuration.md
      - Effective trading config resolver: technical/effective-trading-config-resolver.md
      - Runner extraction: technical/runner-extraction.md
      - DTOs MTF et TradeCandidate: technical/mtf-dtos-and-trade-candidate.md
      - EntryZone module: technical/entry-zone-module.md
      - Risk / Leverage module: technical/risk-and-leverage-module.md
      - SLTP / LiquidationGuard module: technical/sltp-liquidation-guard-module.md
      - OrderPlan / ExecutionPort module: technical/order-plan-execution-port-module.md
      - Fake / Paper gateway: technical/fake-paper-gateway.md
      - OKX dry-run: technical/okx-dry-run.md
      - Hyperliquid dry-run: technical/hyperliquid-dry-run.md
      - Hyperliquid testnet readiness: technical/hyperliquid-testnet-readiness.md
      - Demo/Testnet safety envelope: technical/demo-testnet-safety-envelope.md
      - Exchange private observability policy: technical/exchange-private-observability-policy.md
      - Exchange readiness consolidation: technical/exchange-readiness-consolidation.md
      - Exchange readiness matrix: technical/exchange-readiness-matrix.md
      - Exchange runtime gates: technical/exchange-runtime-gates.md
      - Exchange schedule policy: technical/exchange-schedule-policy.md
      - Templates clés environnement: technical/environment-key-templates.md
      - Temporal workers: technical/temporal.md
      - Migration legacy → orchestrateur: technical/legacy-migration.md
      - Python orchestrator: technical/python-orchestrator.md
      - Backtesting net deterministe: technical/backtesting-engine.md
      - Frontend et Ops: technical/frontend.md
      - Architecture cible trading platform: technical/trading-platform-target-architecture.md
      - Architecture Trading Core modulaire: technical/trading-core-modular-architecture.md
      - Analyse migration Trading Core: technical/trading-core-migration-analysis.md
      - Plan PR canoniques Trading Core: technical/trading-core-canonical-pr-plan.md
  - Graphes:
      - Piles d'execution: graphs/execution-stacks.md
  - Runbooks:
      - Exploitation: runbooks/operations.md
      - Investigation: runbooks/investigation.md
      - Demo/Testnet kill switch: runbooks/demo-testnet-kill-switch.md
      - Recette orchestrateur R1-R16: runbooks/orchestrator-runtime-recipe-r1-r16.md
  - Rapports:
      - "Recette runtime orchestrateur #188": reports/orchestrator-runtime-final-report.md
      - "Baseline bad trades #132": reports/bad-trades-baseline.md
  - Inventaires:
      - Couverture projet: inventories/project-inventory.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - tables
  - toc:
      permalink: true

extra:
  version: "2026-06-02"
