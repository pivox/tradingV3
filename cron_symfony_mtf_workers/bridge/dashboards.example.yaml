# Example execution dashboards for the Temporal -> Symfony bridge (PR13).
#
# A dashboard is a named matrix of targets. Each target maps to one Symfony
# POST /api/mtf/run call. The bridge runs the targets sequentially and reports OK only
# when every target succeeds (see fail_policy).
#
# SAFETY: every target here is dry_run=true. OKX and Hyperliquid stay dry-run only
# (PR11/PR12) and a target with dry_run=false for them is rejected at load time.
# "network: mainnet" is informational ONLY and never authorizes live trading.
# Bitmart live remains served by the legacy direct schedule, untouched by this file.
#
# Copy this file (e.g. to bridge/dashboards.yaml) and point BRIDGE_DASHBOARDS_PATH at it
# to customize per environment. Do NOT put any secret here.

dashboards:
  - dashboard_id: okx-hl-dry-run
    cadence: "*/1 * * * *"
    fail_policy: continue
    targets:
      - target_id: okx-demo-scalper
        exchange: okx
        network: demo
        market_type: perpetual
        mtf_profile: scalper
        dry_run: true
        workers: 4
      - target_id: hyperliquid-mainnet-regular
        exchange: hyperliquid
        network: mainnet
        market_type: perpetual
        mtf_profile: regular
        dry_run: true
        workers: 4

  - dashboard_id: bitmart-dry-run
    cadence: "*/1 * * * *"
    fail_policy: continue
    targets:
      - target_id: bitmart-scalper-micro
        exchange: bitmart
        market_type: perpetual
        mtf_profile: scalper_micro
        dry_run: true
        workers: 4
